<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loading…</title>
  <meta name="description" content="">

  <!-- GSAP & Plugins CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:#0a0a0f;--bg-soft:#12121c;--surface:#1a1a2e;--text:#e8e8f0;--text-dim:#8a8aa0;
      --accent:#00f0ff;--accent-2:#ff2e88;--accent-3:#b537f2;
      --border:rgba(255,255,255,0.08);--glow:0 0 30px rgba(0,240,255,0.35);
    }

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); color: var(--text); font-family:'Space Grotesk',sans-serif; overflow-x: hidden; line-height: 1.6; }

    .bg-mesh {
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 0%,color-mix(in srgb,var(--accent) 14%,transparent),transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 30%,color-mix(in srgb,var(--accent-2) 12%,transparent),transparent 60%),
        radial-gradient(ellipse 40% 60% at 50% 100%,color-mix(in srgb,var(--accent-3) 10%,transparent),transparent 60%);
    }
    .bg-grid {
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
      background-size:60px 60px;
      mask-image:radial-gradient(ellipse 80% 60% at 50% 50%,#000 30%,transparent 90%);
    }
    main { position:relative; z-index:1; }

    body.loading main { visibility:hidden; }
    .load-error {
      position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;text-align:center;
      background:var(--bg);color:var(--text-dim);font-family:'JetBrains Mono',monospace;padding:2rem;font-size:.9rem;
    }
    .load-error.show { display:flex; }

    /* cursor */
    .cursor { position:fixed;width:8px;height:8px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9999;mix-blend-mode:screen;transition:width .25s,height .25s,background .25s;transform:translate(-50%,-50%); }
    .cursor-ring { position:fixed;width:40px;height:40px;border-radius:50%;border:1.5px solid var(--accent);pointer-events:none;z-index:9998;mix-blend-mode:screen;transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s,opacity .25s; }
    .cursor.is-hover { width:4px;height:4px; }
    .cursor-ring.is-hover { width:60px;height:60px;border-color:var(--accent-2); }
    @media (hover:none){ .cursor,.cursor-ring{display:none;} }

    /* nav */
    nav { position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.4rem 3rem;backdrop-filter:blur(12px);background:color-mix(in srgb,var(--bg) 60%,transparent);border-bottom:1px solid var(--border);transition:transform .4s ease; }
    nav.hidden { transform:translateY(-110%); }
    .nav-logo { font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.05rem;letter-spacing:.05em;display:flex;align-items:center;gap:.5rem; }
    .nav-logo .dot { color:var(--accent); }
    .nav-links { display:flex;gap:2.2rem;list-style:none; }
    .nav-links a { color:var(--text-dim);text-decoration:none;font-size:.9rem;font-family:'JetBrains Mono',monospace;letter-spacing:.03em;transition:color .3s;position:relative; }
    .nav-links a::after { content:'';position:absolute;left:0;bottom:-4px;width:0;height:1px;background:var(--accent);transition:width .3s ease; }
    .nav-links a:hover { color:var(--text); }
    .nav-links a:hover::after { width:100%; }

    /* hero */
    #hero { min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 3rem;position:relative; }
    .hero-tag { font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:.6rem; }
    .hero-tag::before { content:'';width:32px;height:1px;background:var(--accent); }
    .hero-title { font-size:clamp(3rem,9vw,8rem);font-weight:700;line-height:.95;letter-spacing:-.03em;margin-bottom:1.2rem; }
    .hero-title .line { display:block;overflow:hidden; }
    .hero-title .line span { display:inline-block;will-change:transform; }
    .hero-title .accent-text { background:linear-gradient(120deg,var(--accent),var(--accent-2) 50%,var(--accent-3));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent; }
    .hero-subtitle { font-size:clamp(1rem,2vw,1.4rem);color:var(--text-dim);max-width:560px;margin-bottom:2.5rem;font-weight:300; }
    .hero-subtitle strong { color:var(--text);font-weight:500; }
    .hero-cta { display:flex;gap:1rem;flex-wrap:wrap; }
    .btn { display:inline-flex;align-items:center;gap:.6rem;padding:.85rem 1.8rem;font-family:'JetBrains Mono',monospace;font-size:.85rem;letter-spacing:.05em;text-decoration:none;border-radius:4px;transition:all .3s ease;cursor:pointer;border:none;position:relative;overflow:hidden; }
    .btn-primary { background:var(--accent);color:#001218;font-weight:700; }
    .btn-primary:hover { box-shadow:var(--glow);transform:translateY(-2px); }
    .btn-ghost { background:transparent;color:var(--text);border:1px solid var(--border); }
    .btn-ghost:hover { border-color:var(--accent);color:var(--accent); }
    .hero-scroll { position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:.6rem; }
    .hero-scroll .mouse { width:22px;height:36px;border:1.5px solid var(--text-dim);border-radius:12px;position:relative; }
    .hero-scroll .mouse::after { content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);width:3px;height:7px;border-radius:2px;background:var(--accent);animation:scrollWheel 1.8s ease-in-out infinite; }
    @keyframes scrollWheel { 0%,100%{transform:translateX(-50%) translateY(0);opacity:1;} 50%{transform:translateX(-50%) translateY(10px);opacity:0;} }
    .orb { position:absolute;border-radius:50%;filter:blur(60px);opacity:.5;pointer-events:none; }
    .orb-1 { width:320px;height:320px;background:var(--accent);top:15%;right:8%; }
    .orb-2 { width:240px;height:240px;background:var(--accent-2);bottom:10%;left:5%;opacity:.35; }

    /* sections */
    section { padding:8rem 3rem;position:relative; }
    .section-label { font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem; }
    .section-label::before { content:'';width:24px;height:1px;background:var(--accent); }
    .section-title { font-size:clamp(2rem,5vw,3.5rem);font-weight:700;line-height:1.1;letter-spacing:-.02em;margin-bottom:3.5rem;max-width:800px; }

    /* about */
    #about { max-width:1200px;margin-inline:auto; }
    .about-grid { display:grid;grid-template-columns:1.2fr 1fr;gap:4rem;align-items:start; }
    .about-text p { font-size:1.1rem;color:var(--text-dim);margin-bottom:1.4rem;font-weight:300; }
    .about-text p strong { color:var(--text);font-weight:500; }
    .about-stats { display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem; }
    .stat-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.6rem;transition:border-color .3s,transform .3s; }
    .stat-card:hover { border-color:var(--accent);transform:translateY(-4px); }
    .stat-num { font-size:2.4rem;font-weight:700;font-family:'JetBrains Mono',monospace;background:linear-gradient(120deg,var(--accent),var(--accent-3));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent; }
    .stat-label { font-size:.8rem;color:var(--text-dim);margin-top:.3rem;letter-spacing:.05em; }

    /* skills */
    #skills { max-width:1200px;margin-inline:auto; }
    .skills-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem; }
    .skill-card { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;position:relative;overflow:hidden;transition:border-color .4s ease,transform .4s ease; }
    .skill-card::before { content:'';position:absolute;inset:0;border-radius:14px;padding:1px;background:linear-gradient(135deg,var(--accent),transparent 40%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .4s; }
    .skill-card:hover { transform:translateY(-6px); }
    .skill-card:hover::before { opacity:1; }
    .skill-icon { width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:1.2rem;background:color-mix(in srgb,var(--accent) 12%,transparent); }
    .skill-card h3 { font-size:1.2rem;margin-bottom:.6rem; }
    .skill-card p { color:var(--text-dim);font-size:.92rem;font-weight:300; }
    .skill-tags { display:flex;flex-wrap:wrap;gap:.4rem;margin-top:1.2rem; }
    .skill-tag { font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:.25rem .6rem;border-radius:4px;background:rgba(255,255,255,0.04);color:var(--text-dim);border:1px solid var(--border); }

    /* ===== Projects: 行式布局 + 媒体 ===== */
    #projects { max-width:1400px;margin-inline:auto; }
    .projects-list { display:flex;flex-direction:column;gap:3rem; }
    .project-row {
      display:grid;grid-template-columns:1.7fr 1fr;gap:3rem;align-items:center;
      background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;
      transition:border-color .4s ease,transform .4s ease;
    }
    .project-row:hover { border-color:var(--accent);transform:translateY(-4px); }
    .project-media { position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--bg-soft); }
    .project-media video,
    .project-media iframe,
    .project-media .media-placeholder { width:100%;height:100%;border:none;display:block;object-fit:cover;background:linear-gradient(135deg,var(--row-from,#1a0033),var(--row-to,#330066)); }
    .project-media .media-placeholder { display:flex;align-items:center;justify-content:center; }
    .project-media .media-placeholder .glyph { font-family:'JetBrains Mono',monospace;font-size:3.5rem;font-weight:700;opacity:.7; }
    .project-media .play-hint { position:absolute;top:.8rem;right:.8rem;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text);background:color-mix(in srgb,var(--bg) 70%,transparent);padding:.3rem .6rem;border-radius:4px;backdrop-filter:blur(4px);pointer-events:none; }
    .project-media video { cursor:pointer; }
    /* 图片画廊 */
    .gallery { display:grid;height:100%; }
    .gallery.g-1 { grid-template-columns:1fr; }
    .gallery.g-2 { grid-template-columns:1fr 1fr; }
    .gallery.g-3 { grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr; }
    .gallery.g-3 .g-item:first-child { grid-row:1 / 3; }
    .gallery .g-item { position:relative;overflow:hidden;cursor:pointer;background:var(--bg-soft); }
    .gallery .g-item img { width:100%;height:100%;object-fit:cover;transition:transform .5s ease; }
    .gallery .g-item:hover img { transform:scale(1.05); }
    .project-info { padding:2rem 2.5rem 2rem 0; }
    .project-meta { display:flex;gap:1rem;align-items:center;margin-bottom:.6rem;flex-wrap:wrap; }
    .project-type { font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent);letter-spacing:.1em;text-transform:uppercase; }
    .project-year { font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-dim); }
    .project-info h3 { font-size:clamp(1.4rem,2.5vw,1.9rem);margin-bottom:.7rem;line-height:1.2; }
    .project-info p { color:var(--text-dim);font-size:.98rem;font-weight:300; }

    /* lightbox */
    .lightbox { position:fixed;inset:0;z-index:9000;display:none;align-items:center;justify-content:center;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(8px);padding:3rem; }
    .lightbox.show { display:flex; }
    .lightbox img { max-width:90%;max-height:85vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5); }
    .lightbox-close { position:absolute;top:1.5rem;right:2rem;font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--text-dim);cursor:pointer;background:var(--surface);border:1px solid var(--border);padding:.5rem 1rem;border-radius:6px;transition:all .3s; }
    .lightbox-close:hover { color:var(--accent);border-color:var(--accent); }

    /* contact */
    #contact { text-align:center;padding:10rem 3rem; }
    .contact-label { font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.5rem; }
    .contact-title { font-size:clamp(2.5rem,7vw,5rem);font-weight:700;line-height:1;letter-spacing:-.02em;margin-bottom:2.5rem; }
    .contact-title .accent-text { background:linear-gradient(120deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent; }
    .contact-links { display:flex;justify-content:center;gap:1.2rem;flex-wrap:wrap; }
    .contact-link { display:inline-flex;align-items:center;gap:.6rem;padding:.9rem 1.6rem;border:1px solid var(--border);border-radius:50px;text-decoration:none;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:.85rem;transition:all .3s ease;cursor:pointer; }
    .contact-link:hover { border-color:var(--accent);color:var(--accent);transform:translateY(-3px); }

    /* toast */
    .toast { position:fixed;bottom:2rem;left:50%;transform:translate(-50%,calc(100% + 3rem));z-index:9500;background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:.9rem 1.6rem;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:.85rem;box-shadow:var(--glow);transition:transform .4s cubic-bezier(.2,.9,.3,1.2),opacity .3s ease;pointer-events:none;opacity:0; }
    .toast.show { transform:translate(-50%,0);opacity:1; }

    footer { padding:2rem 3rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text-dim); }

    .scroll-progress { position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-2));z-index:200;box-shadow:0 0 10px var(--accent); }

    @media (max-width:900px){
      .project-row { grid-template-columns:1fr; }
      .project-info { padding:1.5rem 1.8rem 1.8rem; }
    }
    @media (max-width:860px){
      nav{padding:1rem 1.5rem;} .nav-links{display:none;}
      section,#hero,#contact{padding-left:1.5rem;padding-right:1.5rem;}
      .about-grid{grid-template-columns:1fr;gap:2.5rem;}
      .about-stats{grid-template-columns:1fr 1fr;}
      .skills-grid{grid-template-columns:1fr;}
      footer{flex-direction:column;gap:.6rem;text-align:center;}
    }
    @media (max-width:480px){
      .about-stats{grid-template-columns:1fr;}
    }
  </style>
</head>
<body class="loading">
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>
  <div class="cursor"></div>
  <div class="cursor-ring"></div>
  <div class="scroll-progress"></div>

  <div class="load-error" id="loadError">
    <div>
      <p style="color:var(--accent);margin-bottom:.8rem;">⚠ 无法加载 config.json</p>
      <p>请通过 http 服务器预览（部署到 GitHub Pages，</p>
      <p>或本地运行 <code>python -m http.server</code>）。</p>
      <p style="margin-top:.8rem;">直接双击打开 file:// 无法读取 JSON。</p>
    </div>
  </div>

  <nav id="nav">
    <div class="nav-logo" id="navLogo">VIKE<span class="dot">.</span>TA</div>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <main>
    <section id="hero">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="hero-tag" id="heroTag"></div>
      <h1 class="hero-title" id="heroTitle"></h1>
      <p class="hero-subtitle" id="heroSubtitle"></p>
      <div class="hero-cta" id="heroCta"></div>
      <div class="hero-scroll"><div class="mouse"></div><span>SCROLL</span></div>
    </section>

    <section id="about">
      <div class="section-label" id="aboutLabel"></div>
      <h2 class="section-title" id="aboutTitle"></h2>
      <div class="about-grid">
        <div class="about-text" id="aboutText"></div>
        <div class="about-stats" id="aboutStats"></div>
      </div>
    </section>

    <section id="skills">
      <div class="section-label" id="skillsLabel"></div>
      <h2 class="section-title" id="skillsTitle"></h2>
      <div class="skills-grid" id="skillsGrid"></div>
    </section>

    <section id="projects">
      <div class="section-label" id="projectsLabel"></div>
      <h2 class="section-title" id="projectsTitle"></h2>
      <div class="projects-list" id="projectsList"></div>
    </section>

    <section id="contact">
      <div class="contact-label" id="contactLabel"></div>
      <h2 class="contact-title" id="contactTitle"></h2>
      <div class="contact-links" id="contactLinks"></div>
    </section>

    <footer>
      <span id="footerLeft"></span>
      <span id="footerRight"></span>
    </footer>
  </main>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightboxClose">✕ CLOSE</span>
    <img id="lightboxImg" src="" alt="">
  </div>
  <div class="toast" id="toast"></div>

  <script>
  /* ============================================================ */
  function hexToRgba(hex,a){const h=hex.replace('#','');return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}
  function applyTheme(c){const r=document.documentElement;
    r.style.setProperty('--bg',c.bg);r.style.setProperty('--bg-soft',c.bgSoft);r.style.setProperty('--surface',c.surface);
    r.style.setProperty('--text',c.text);r.style.setProperty('--text-dim',c.textDim);
    r.style.setProperty('--accent',c.accent);r.style.setProperty('--accent-2',c.accent2);r.style.setProperty('--accent-3',c.accent3);
    r.style.setProperty('--border',c.border);r.style.setProperty('--glow',`0 0 30px ${hexToRgba(c.accent,0.35)}`);
  }

  /* 转义，防止 XSS（desc/paragraphs 里允许 <strong> 等标签故不转义文本；只对纯文本字段用） */
  function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

  function render(cfg){
    const $=id=>document.getElementById(id);
    document.title=cfg.profile.pageTitle;
    document.querySelector('meta[name="description"]').setAttribute('content',cfg.profile.pageDescription);
    $('navLogo').innerHTML=cfg.profile.navLogo.replace('.',`<span class="dot">.</span>`);
    $('footerLeft').textContent=cfg.profile.footerLeft;
    $('footerRight').textContent=cfg.profile.footerRight;
    $('navLinks').innerHTML=cfg.nav.links.map(l=>`<li><a href="${l.href}">${l.text}</a></li>`).join('');

    $('heroTag').textContent=cfg.hero.tag;
    $('heroTitle').innerHTML=cfg.hero.titleLines.map((line,i)=>
      `<span class="line"><span class="hero-word${i===cfg.hero.accentLineIndex?' accent-text':''}">${line}</span></span>`).join('');
    $('heroSubtitle').innerHTML=cfg.hero.subtitle;
    $('heroCta').innerHTML=`<a href="${cfg.hero.ctaPrimary.href}" class="btn btn-primary" data-magnetic>${cfg.hero.ctaPrimary.text}</a><a href="${cfg.hero.ctaGhost.href}" class="btn btn-ghost" data-magnetic>${cfg.hero.ctaGhost.text}</a>`;

    $('aboutLabel').textContent=cfg.about.label;
    $('aboutTitle').textContent=cfg.about.title;
    $('aboutText').innerHTML=cfg.about.paragraphs.map(p=>`<p>${p}</p>`).join('');
    $('aboutStats').innerHTML=cfg.about.stats.map(s=>`<div class="stat-card reveal-up"><div class="stat-num" data-count="${s.num}" data-suffix="${s.suffix||''}">0</div><div class="stat-label">${s.label}</div></div>`).join('');

    $('skillsLabel').textContent=cfg.skills.label;
    $('skillsTitle').textContent=cfg.skills.title;
    $('skillsGrid').innerHTML=cfg.skills.items.map(s=>`<div class="skill-card reveal-up"><div class="skill-icon">${s.icon}</div><h3>${s.title}</h3><p>${s.desc}</p><div class="skill-tags">${s.tags.map(t=>`<span class="skill-tag">${t}</span>`).join('')}</div></div>`).join('');

    /* ===== Projects: 行式 + 媒体 ===== */
    $('projectsLabel').textContent=cfg.projects.label;
    $('projectsTitle').textContent=cfg.projects.title;
    $('projectsList').innerHTML=cfg.projects.items.map(p=>{
      const m=p.media||{};
      let mediaHTML='';
      if(m.kind==='video'){
        mediaHTML=`<video src="${m.video}" poster="${m.poster||''}" controls preload="metadata" playsinline></video>`;
      }else if(m.kind==='images'&&m.images&&m.images.length){
        const n=m.images.length;
        const cls=n>=3?'g-3':n===2?'g-2':'g-1';
        const imgs=m.images.slice(0,3).map(src=>`<div class="g-item"><img src="${src}" loading="lazy" alt="${esc(p.title)}" data-full="${src}"></div>`).join('');
        mediaHTML=`<div class="gallery ${cls}">${imgs}</div>`;
      }else if(m.kind==='embed'&&m.embed){
        mediaHTML=`<iframe src="${m.embed}" allowfullscreen frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>`;
      }else{
        mediaHTML=`<div class="media-placeholder" style="--row-from:${p.bgFrom};--row-to:${p.bgTo};"><span class="glyph" style="color:${p.glyphColor};">${p.glyph}</span></div>`;
      }
      return `<div class="project-row reveal-up">
        <div class="project-media">${mediaHTML}</div>
        <div class="project-info">
          <div class="project-meta"><span class="project-type">${p.type}</span><span class="project-year">${p.year}</span></div>
          <h3>${p.title}</h3>
          <p>${p.desc}</p>
        </div>
      </div>`;
    }).join('');

    /* ===== Contact: 智能按钮 ===== */
    $('contactLabel').textContent=cfg.contact.label;
    $('contactTitle').innerHTML=cfg.contact.titleLines.map((line,i)=>`${i>0?'<br>':''}<span class="${i===cfg.contact.accentLineIndex?'accent-text':''}">${line}</span>`).join('');
    $('contactLinks').innerHTML=cfg.contact.links.map((l,i)=>{
      // 自动推断 type
      let type=l.type;
      if(!type){ type = /^https?:\/\//i.test(l.href||'') ? 'link' : /@/.test(l.href||'') ? 'email' : 'copy'; }
      const dataAttrs=`data-ctype="${type}" data-href="${esc(l.href||'')}" data-value="${esc(l.value||l.href||'')}" data-hint="${esc(l.hint||'已复制：'+(l.value||l.href||''))}"`;
      return `<span class="contact-link" ${dataAttrs} data-magnetic>${l.text}</span>`;
    }).join('');
  }

  /* ---------- 联系按钮行为 ---------- */
  function bindContactLinks(){
    document.querySelectorAll('.contact-link').forEach(el=>{
      el.addEventListener('click',e=>{
        const type=el.dataset.ctype;
        const href=el.dataset.href;
        const value=el.dataset.value;
        const hint=el.dataset.hint;
        if(type==='link'){ window.open(href,'_blank','noopener'); }
        else if(type==='email'){ window.location.href='mailto:'+href; }
        else if(type==='copy'){
          navigator.clipboard.writeText(value).then(()=>showToast(hint)).catch(()=>{
            // 降级：临时 textarea
            const ta=document.createElement('textarea');ta.value=value;document.body.appendChild(ta);ta.select();
            try{document.execCommand('copy');showToast(hint);}catch(_){showToast('复制失败，请手动复制：'+value);}
            document.body.removeChild(ta);
          });
        }
      });
    });
  }

  /* ---------- toast ---------- */
  let toastTimer;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
  }

  /* ---------- lightbox ---------- */
  function bindLightbox(){
    const lb=document.getElementById('lightbox');
    const lbImg=document.getElementById('lightboxImg');
    const close=()=>lb.classList.remove('show');
    document.addEventListener('click',e=>{
      const img=e.target.closest('.g-item img');
      if(img){ lbImg.src=img.dataset.full; lb.classList.add('show'); }
    });
    document.getElementById('lightboxClose').addEventListener('click',close);
    lb.addEventListener('click',e=>{ if(e.target===lb) close(); });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') close(); });
  }

  /* ---------- 加载 ---------- */
  fetch('config.json').then(r=>{if(!r.ok)throw new Error('fetch');return r.json();})
    .then(cfg=>{applyTheme(cfg.theme.colors);render(cfg);document.body.classList.remove('loading');initGSAP();bindContactLinks();bindLightbox();})
    .catch(()=>document.getElementById('loadError').classList.add('show'));

  /* ============================================================
   *  GSAP — 遵循 greensock/gsap-skills 最佳实践
   * ============================================================ */
  function initGSAP(){
    gsap.registerPlugin(ScrollTrigger,ScrollToPlugin);

    const cursor=document.querySelector('.cursor'),ring=document.querySelector('.cursor-ring');
    const xToC=gsap.quickTo(cursor,"x",{duration:0.15,ease:"power3"}),yToC=gsap.quickTo(cursor,"y",{duration:0.15,ease:"power3"});
    const xToR=gsap.quickTo(ring,"x",{duration:0.35,ease:"power3"}),yToR=gsap.quickTo(ring,"y",{duration:0.35,ease:"power3"});
    window.addEventListener('mousemove',e=>{xToC(e.clientX);yToC(e.clientY);xToR(e.clientX);yToR(e.clientY);});
    document.querySelectorAll('a,[data-magnetic],.project-row,.skill-card,.contact-link').forEach(el=>{
      el.addEventListener('mouseenter',()=>{cursor.classList.add('is-hover');ring.classList.add('is-hover');});
      el.addEventListener('mouseleave',()=>{cursor.classList.remove('is-hover');ring.classList.remove('is-hover');});
    });

    document.querySelectorAll('[data-magnetic]').forEach(btn=>{
      const xTo=gsap.quickTo(btn,"x",{duration:0.4,ease:"power3"}),yTo=gsap.quickTo(btn,"y",{duration:0.4,ease:"power3"});
      btn.addEventListener('mousemove',e=>{const r=btn.getBoundingClientRect();xTo((e.clientX-(r.left+r.width/2))*0.35);yTo((e.clientY-(r.top+r.height/2))*0.35);});
      btn.addEventListener('mouseleave',()=>{xTo(0);yTo(0);});
    });

    let lastScroll=0;const nav=document.getElementById('nav');
    ScrollTrigger.create({start:'top -100',onUpdate:()=>{const y=window.scrollY;if(y>lastScroll&&y>300)nav.classList.add('hidden');else nav.classList.remove('hidden');lastScroll=y;}});

    gsap.to('.scroll-progress',{width:'100%',ease:'none',scrollTrigger:{start:'top top',end:'max',scrub:0.3}});
    gsap.to('.orb-1',{yPercent:30,ease:'none',scrollTrigger:{trigger:'#hero',start:'top top',end:'bottom top',scrub:1}});
    gsap.to('.orb-2',{yPercent:-20,ease:'none',scrollTrigger:{trigger:'#hero',start:'top top',end:'bottom top',scrub:1}});

    let mm=gsap.matchMedia();
    mm.add({isDesktop:'(min-width:861px)',isMobile:'(max-width:860px)',reduceMotion:'(prefers-reduced-motion: reduce)'},(ctx)=>{
      const {isDesktop,isMobile,reduceMotion}=ctx.conditions;
      const d=reduceMotion?0:0.9;
      const heroTL=gsap.timeline({defaults:{ease:'power3.out',duration:d}});
      heroTL
        .from('.hero-tag',{y:30,autoAlpha:0,duration:reduceMotion?0:0.6})
        .from('.hero-word',{yPercent:120,autoAlpha:0,stagger:0.12},'-=0.2')
        .from('.hero-subtitle',{y:30,autoAlpha:0},'-=0.4')
        .from('.hero-cta > *',{y:20,autoAlpha:0,stagger:0.1},'-=0.3')
        .from('.hero-scroll',{autoAlpha:0},'-=0.2')
        .from('.orb',{scale:0.3,autoAlpha:0,stagger:0.2,duration:reduceMotion?0:1.2},0);

      gsap.set('.reveal-up',{y:40,autoAlpha:0});
      ScrollTrigger.batch('.reveal-up',{start:'top 85%',
        onEnter:batch=>gsap.to(batch,{y:0,autoAlpha:1,stagger:0.12,duration:reduceMotion?0:0.8,ease:'power3.out',overwrite:true}),
        onLeaveBack:batch=>gsap.set(batch,{y:40,autoAlpha:0,overwrite:true})
      });

      document.querySelectorAll('[data-count]').forEach(el=>{
        const target=parseInt(el.dataset.count,10),suffix=el.dataset.suffix||'',obj={val:0};
        ScrollTrigger.create({trigger:el,start:'top 85%',once:true,onEnter:()=>gsap.to(obj,{val:target,duration:reduceMotion?0:1.8,ease:'power2.out',onUpdate:()=>el.textContent=Math.round(obj.val)+suffix})});
      });

      if(!reduceMotion){
        gsap.to('.section-title',{yPercent:isDesktop?-15:-8,ease:'none',scrollTrigger:{trigger:'.section-title',start:'top bottom',end:'bottom top',scrub:1}});
      }
      return ()=>{};
    });

    document.querySelectorAll('a[href^="#"]').forEach(a=>{
      a.addEventListener('click',e=>{const id=a.getAttribute('href');if(id.length>1){const t=document.querySelector(id);if(t){e.preventDefault();gsap.to(window,{duration:0.9,scrollTo:{y:t,offsetY:70},ease:'power2.inOut'});}}});
    });

    if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>ScrollTrigger.refresh());}
  }
  </script>
</body>
</html>
